name: ✅ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run fmt:check
      - run: bun run lint:check
      - run: bun run test
      - run: bun run test:e2e
      - run: bun run typecheck
