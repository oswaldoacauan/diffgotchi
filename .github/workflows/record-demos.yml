name: Record Demos

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: record-demos
  cancel-in-progress: true

jobs:
  record:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build diffgotchi binary
        run: |
          cd packages/cli
          bun build.ts diffgotchi
          codesign --sign - --force diffgotchi 2>/dev/null || true
          sudo cp diffgotchi /usr/local/bin/diffgotchi

      - name: Install VHS
        run: brew install vhs

      - name: Record demos
        run: bun run record-demos

      - name: Commit demo assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/docs/public/demos/
          if git diff --cached --quiet; then
            echo "No demo changes to commit."
          else
            git commit -m "chore: update demo recordings"
            git push origin main
          fi
