name: 📖 Deploy Docs

on:
  push:
    branches: [main]
    paths: ["packages/docs/**", "schemas/**"]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: cd packages/docs && bun run build
      - name: Copy schemas to docs output
        run: cp -r schemas packages/docs/dist/public/schemas
      - uses: actions/upload-pages-artifact@v5
        with:
          path: packages/docs/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
